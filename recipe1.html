<section class="intro">
    <h2>Cheese Toast</h2>
    <img src="cheese-toast.jpg" width="300">

    <p><strong>Preparation Time:</strong> 10 mins</p>
    <p><strong>Difficulty:</strong> Easy</p>

    <h3>Ingredients</h3>
    <ul>
        <li>Bread slices</li>
        <li>Cheese</li>
        <li>Butter</li>
        <li>Chilli flakes</li>
    </ul>

    <h3>Steps</h3>
    <ol>
        <li>Apply butter on bread</li>
        <li>Add cheese on top of it </li>
        <li>Toast on pan until crispy</li>
        <li>Sprinkle chilli flakes</li>
    </ol>
</section>
